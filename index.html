<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Laxita 🎉</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #ffb6c1, #fff0f5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    h1 {
      font-size: 3em;
      color: #ff69b4;
      text-shadow: 2px 2px #fff;
      animation: popIn 2s ease-in-out forwards;
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .balloon {
      position: absolute;
      bottom: -150px;
      width: 60px;
      height: 80px;
      border-radius: 50%;
      background-color: pink;
      animation: floatUp 8s infinite ease-in;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
    }

    .balloon:nth-child(odd) { background-color: #ffb6c1; }
    .balloon:nth-child(even) { background-color: #ffa07a; }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #ff69b4;
      animation: fall 4s infinite;
    }

    @keyframes fall {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0; }
    }

    .message {
      font-size: 1.5em;
      color: #ff4081;
      margin-top: 20px;
      opacity: 0;
      animation: fadeIn 3s ease-in-out 2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    audio {
      display: none;
    }
  </style>
</head>
<body>
  <h1>🎈 Happy Birthday Laxita 🎈</h1>
  <div class="message">Wishing you a day full of smiles, joy, and prosperity 💕</div>

  <script>
    // Balloons
    for (let i = 0; i < 15; i++) {
      let balloon = document.createElement("div");
      balloon.classList.add("balloon");
      balloon.style.left = Math.random() * 100 + "vw";
      balloon.style.animationDuration = (6 + Math.random() * 5) + "s";
      document.body.appendChild(balloon);
    }

    // Confetti
    for (let i = 0; i < 40; i++) {
      let confetti = document.createElement("div");
      confetti.classList.add("confetti");
      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.backgroundColor = ["#ff69b4","#ffb6c1","#fff","#ffa07a"][Math.floor(Math.random()*4)];
      confetti.style.animationDuration = (2 + Math.random() * 3) + "s";
      confetti.style.animationDelay = Math.random() * 2 + "s";
      document.body.appendChild(confetti);
    }
  </script>
</body>
</html>
